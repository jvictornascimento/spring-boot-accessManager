spring.datasource.url=jdbc:h2:mem:accessmanager_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true

app.security.jwt.secret=test-only-change-me-test-only-change-me-123456
app.security.jwt.access-token-expiration-minutes=15
app.security.refresh-token.expiration-days=7
app.security.refresh-token.cookie-secure=false
app.security.refresh-token.cookie-same-site=Lax

openweather.api.url=http://localhost:${wiremock.server.port:0}
openweather.api.key=test-openweather-api-key
