spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true

app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
app.security.refresh-token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}
app.security.refresh-token.cookie-secure=${REFRESH_TOKEN_COOKIE_SECURE:true}
app.security.refresh-token.cookie-same-site=${REFRESH_TOKEN_COOKIE_SAME_SITE:Strict}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

openweather.api.url=${OPENWEATHER_API_URL:https://api.openweathermap.org}
openweather.api.key=${OPENWEATHER_API_KEY}
