spring.datasource.url=jdbc:h2:mem:accessmanager_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

app.security.jwt.secret=${JWT_SECRET:dev-only-change-me-dev-only-change-me-123456}
app.security.jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
app.security.refresh-token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}
app.security.refresh-token.cookie-secure=${REFRESH_TOKEN_COOKIE_SECURE:false}
app.security.refresh-token.cookie-same-site=${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}

openweather.api.url=${OPENWEATHER_API_URL:https://api.openweathermap.org}
openweather.api.key=${OPENWEATHER_API_KEY:}
